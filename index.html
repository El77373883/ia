<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi IA Ilimitada</title>
    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #333; align-self: flex-end; margin-left: auto; }
        .ai { background: #0056b3; }
        .controls { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #00a86b; color: white; border: none; cursor: pointer; }
        #status { font-size: 12px; color: #888; padding: 0 20px; }
    </style>
</head>
<body>

    <div id="status">Estado: Cargando motor...</div>
    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="Escribe algo y buscaré en internet...">
        <button onclick="send()">Enviar</button>
    </div>

    <script type="module">
        import * as webllm from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/+esm";

        const status = document.getElementById("status");
        const chat = document.getElementById("chat");
        let engine;

        // Inicializar la IA local
        async function init() {
            engine = new webllm.MLCEngine();
            engine.setInitProgressCallback((report) => {
                status.innerText = report.text;
            });
            await engine.reload("Llama-3-8B-Instruct-q4f32_1-MLC");
            status.innerText = "IA Lista (100% Local)";
        }

        window.send = async () => {
            const input = document.getElementById("userInput");
            const text = input.value;
            if(!text) return;

            appendMsg(text, 'user');
            input.value = "";
            status.innerText = "Buscando en internet...";

            // 1. Buscamos en internet a través de nuestra API de Vercel
            const searchRes = await fetch(`/api/search?q=${encodeURIComponent(text)}`);
            const searchData = await searchRes.json();
            
            // 2. Creamos el Prompt con los datos encontrados
            const prompt = `Contexto de internet: ${searchData.context} \n\n Pregunta del usuario: ${text} \n\n Responde de forma concisa usando el contexto.`;

            status.innerText = "IA pensando...";
            const messages = [{ role: "user", content: prompt }];
            
            const reply = await engine.chat.completions.create({ messages });
            appendMsg(reply.choices[0].message.content, 'ai');
            status.innerText = "Listo";
        };

        function appendMsg(txt, type) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.innerText = txt;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        init();
    </script>
</body>
</html>
